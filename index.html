<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crystal Ranks</title>
    <link rel="icon" href="Crystal Ranks.png" type="image/png">
    <meta property="og:title" content="Crystal Ranks">
    <meta property="og:description" content="Track your Elo ranking in Crystallized">
    <meta property="og:image" content="https://ropotat0.github.io/Crystal-Ranks/Crystal%20Ranks.png">
    <meta property="og:url" content="https://ropotat0.github.io/Crystal-Ranks/">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="Crystal Ranks">
    <meta name="twitter:description" content="Track your Elo ranking in Crystallized">
    <meta name="twitter:image" content="https://ropotat0.github.io/Crystal-Ranks/Crystal%20Ranks.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #080810; --card: #0f0f1a; --border: #1e1e2e; --text: #e8e8f0; --text-dim: #6b6b8a; --purple: #c026d3; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .site-header { text-align: center; margin-bottom: 20px; width: 100%; max-width: 500px; }
        .site-header h1 { font-family: 'Bebas Neue', sans-serif; font-size: 3rem; letter-spacing: 2px; background: linear-gradient(135deg, #e040fb, #60a5fa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .discord-links { display: flex; gap: 15px; justify-content: center; margin-top: 10px; }
        .discord-links a { color: #5865f2; text-decoration: none; font-weight: bold; font-size: 13px; }
        
        .search-row { width: 100%; max-width: 500px; display: flex; gap: 10px; margin-bottom: 15px; }
        .search-bar { flex: 1; padding: 12px; background: var(--card); border: 1px solid var(--border); border-radius: 10px; color: white; outline: none; }
        .refresh-btn { width: 45px; height: 45px; background: var(--purple); border: none; border-radius: 10px; color: white; cursor: pointer; font-size: 1.2rem; display: flex; align-items: center; justify-content: center; transition: 0.3s; }
        .refresh-btn:active { transform: scale(0.9); }
        .spinning { animation: spin 0.8s ease-out forwards; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .stats-bar { width: 100%; max-width: 500px; display: flex; justify-content: space-between; font-size: 11px; color: var(--text-dim); margin-bottom: 10px; }
        .lb-card { width: 100%; max-width: 500px; background: var(--card); border: 1px solid var(--border); border-radius: 15px; overflow: hidden; }
        .lb-row { display: grid; grid-template-columns: 40px 1fr auto; align-items: center; padding: 12px 15px; border-bottom: 1px solid var(--border); cursor: pointer; }
        .lb-row:hover { background: #141424; }
        .row-info { display: flex; align-items: center; gap: 12px; }
        .avatar { width: 35px; height: 35px; border-radius: 50%; object-fit: cover; border: 1px solid #333; }
        .lb-name { font-weight: 700; font-size: 14px; }
        .streak { color: #fbbf24; font-size: 11px; font-weight: bold; }
        
        .lb-elo-cell { text-align: right; }
        .lb-elo { font-family: 'Bebas Neue', sans-serif; font-size: 1.45rem; line-height: 1; }
        .rank-label { font-size: 13px; font-weight: 900; text-transform: uppercase; margin-top: 5px; display: block; letter-spacing: 0.8px; }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; align-items: center; justify-content: center; }
        .modal-content { background: var(--card); border: 1px solid var(--border); padding: 30px; border-radius: 20px; text-align: center; width: 300px; position: relative; }
        .modal-avatar { width: 80px; height: 80px; border-radius: 50%; border: 3px solid var(--purple); margin-bottom: 15px; }
    </style>
</head>
<body>

<header class="site-header">
    <h1>Crystal Ranks</h1>
    <div class="discord-links">
        <a href="https://discord.gg/W25p9CWHfx" target="_blank">🔗 Crystallized Competitive</a>
        <a href="https://discord.gg/xVfQxdGhsQ" target="_blank">🔗 Ciibr Studios</a>
    </div>
</header>

<div class="search-row">
    <input type="text" id="search" class="search-bar" placeholder="Search for a player..." onkeyup="filter()">
    <button class="refresh-btn" id="refresh-btn" onclick="load()">↻</button>
</div>

<div class="stats-bar">
    <span id="player-count">0 Players</span>
    <span id="update-time">Syncing...</span>
</div>

<div class="lb-card" id="lb-list"></div>

<div class="modal" id="modal" onclick="closeModal()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <img id="m-avatar" class="modal-avatar">
        <h2 id="m-name"></h2>
        <p id="m-user" style="color:var(--text-dim); font-size:13px; margin-bottom:15px;"></p>
        <div style="text-align:left; font-size:14px; display:grid; grid-template-columns:1fr 1fr; gap:10px;">
            <div>Elo: <b id="m-elo"></b></div>
            <div>Rank: <b id="m-rank"></b></div>
            <div>Pos: <b id="m-pos"></b></div>
            <div>Streak: <b id="m-streak"></b></div>
        </div>
    </div>
</div>

<script>
let players = [];
function getRank(elo, list) {
    const sorted = [...list].sort((a,b)=>b.elo-a.elo);
    const pos = sorted.findIndex(p => p.elo <= elo);
    const pct = (pos/sorted.length)*100;
    if (pct <= 0.03) return {n:'Cosmic', e:'⚫', c:'#8A00C4'};
    if (pct <= 1) return {n:'Prismatic', e:'⭕', c:'#FF0080'};
    if (pct <= 6) return {n:'Brilliant', e:'⭐', c:'#FFFF00'};
    if (pct <= 27.4) return {n:'Lustrous', e:'🟣', c:'#BF00FF'};
    if (pct <= 65.57) return {n:'Refined', e:'🔵', c:'#00BFFF'};
    return {n:'Faint', e:'🟢', c:'#00FF7F'};
}

async function fetchData() {
    try {
        const res = await fetch('https://raw.githubusercontent.com/RoPotat0/Crystallized-Elo-System/main/elo-data.json?nocache=' + Math.random());
        const data = await res.json();
        players = data.players.sort((a,b)=>b.elo-a.elo);
        document.getElementById('player-count').innerText = players.length + " Players";
        if(data.lastUpdated) {
            const date = new Date(data.lastUpdated * 1000);
            document.getElementById('update-time').innerText = "Last update: " + date.toLocaleTimeString();
        }
        render(players);
    } catch(e) { console.error(e); }
}

async function load() {
    const btn = document.getElementById('refresh-btn');
    btn.classList.remove('spinning');
    void btn.offsetWidth; // force reflow so animation restarts
    btn.classList.add('spinning');
    btn.addEventListener('animationend', () => btn.classList.remove('spinning'), { once: true });
    await fetchData();
}

function render(list) {
    const container = document.getElementById('lb-list');
    container.innerHTML = list.map((p, i) => {
        const r = getRank(p.elo, players);
        return `<div class="lb-row" onclick="show('${p.discordId}')">
            <div style="color:var(--text-dim); font-weight:bold;">#${players.indexOf(p)+1}</div>
            <div class="row-info">
                <img src="${p.avatar}" class="avatar">
                <div>
                    <div class="lb-name">${p.name}</div>
                    ${p.streak > 0 ? `<span class="streak">🔥${p.streak}</span>` : ''}
                </div>
            </div>
            <div class="lb-elo-cell">
                <div class="lb-elo">${p.elo}</div>
                <span class="rank-label" style="color:${r.c}">${r.e} ${r.n}</span>
            </div>
        </div>`;
    }).join('');
}

function filter() {
    const q = document.getElementById('search').value.toLowerCase();
    render(players.filter(p => p.name.toLowerCase().includes(q)));
}

function show(id) {
    const p = players.find(x => x.discordId === id);
    const r = getRank(p.elo, players);
    document.getElementById('m-avatar').src = p.avatar;
    document.getElementById('m-name').innerText = p.name;
    document.getElementById('m-user').innerText = "@" + (p.username || "unknown");
    document.getElementById('m-elo').innerText = p.elo;
    document.getElementById('m-rank').innerText = r.n;
    document.getElementById('m-pos').innerText = "#" + (players.indexOf(p)+1);
    document.getElementById('m-streak').innerText = p.streak || 0;
    document.getElementById('modal').style.display = 'flex';
}
function closeModal() { document.getElementById('modal').style.display = 'none'; }
window.onload = fetchData;
</script>
</body>
</html>
