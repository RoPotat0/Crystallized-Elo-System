<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crystal Ranks</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #05050a; --card: #0c0c16; --border: #1a1a2e;
            --text: #ffffff; --text-dim: #8080a3;
            --purple: #c026d3; --accent: #60a5fa; --gold: #fbbf24;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif;
            min-height: 100vh; padding: 20px 0 80px; overflow-x: hidden;
        }
        body::after {
            content: ''; position: fixed; inset: 0; z-index: -1;
            background-image: linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 40px 40px; pointer-events: none;
        }

        .container { max-width: 600px; margin: 0 auto; padding: 0 20px; }
        
        .nav-link { 
            display: block; text-align: center; color: var(--accent); 
            text-decoration: none; font-weight: 700; font-size: 12px; 
            letter-spacing: 2px; text-transform: uppercase; margin-bottom: 20px;
            transition: 0.3s;
        }
        .nav-link:hover { filter: brightness(1.2); text-shadow: 0 0 10px var(--accent); }

        .site-header { text-align: center; margin-bottom: 40px; }
        .site-header h1 {
            font-family: 'Bebas Neue', sans-serif; font-size: 5rem;
            background: linear-gradient(to bottom, #fff, var(--purple));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            line-height: 0.9;
        }

        .lb-card {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 24px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            overflow: hidden;
        }
        .search-container { padding: 20px; border-bottom: 1px solid var(--border); }
        .search-input {
            width: 100%; background: #11111f; border: 1px solid var(--border);
            padding: 14px 20px; border-radius: 12px; color: #fff; font-family: inherit;
        }

        .lb-row {
            display: grid; grid-template-columns: 40px 45px 1fr auto 60px;
            align-items: center; gap: 12px; padding: 16px 20px;
            border-bottom: 1px solid var(--border); cursor: pointer; transition: 0.2s;
        }
        .lb-row:hover { background: rgba(255,255,255,0.03); transform: scale(1.01); }
        
        .pos { font-family: 'Bebas Neue', sans-serif; color: var(--text-dim); font-size: 1.2rem; }
        .avatar { width: 36px; height: 36px; border-radius: 50%; border: 1px solid var(--border); background: #1a1a2e; }
        .name-box { display: flex; flex-direction: column; }
        .p-name { font-weight: 700; font-size: 15px; }
        .p-streak { font-size: 10px; font-weight: 800; color: var(--gold); }
        .rank-tag { font-size: 10px; font-weight: 900; text-transform: uppercase; padding: 2px 8px; border-radius: 4px; }
        .elo { font-family: 'Bebas Neue', sans-serif; font-size: 1.4rem; text-align: right; }

        .modal {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(8px);
        }
        .modal-content {
            background: var(--card); width: 90%; max-width: 450px;
            border-radius: 32px; border: 1px solid var(--border); padding: 32px;
            position: relative; animation: modalPop 0.3s cubic-bezier(0.17, 0.89, 0.32, 1.28);
        }
        @keyframes modalPop { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .close { position: absolute; top: 20px; right: 20px; cursor: pointer; color: var(--text-dim); }
        .graph-area { height: 180px; margin-top: 24px; }
    </style>
</head>
<body>

<div class="container">
    <a href="https://discord.gg/W25p9CWHfx" class="nav-link">✦ Crystallized Competitive ✦</a>

    <header class="site-header">
        <h1>Crystal Ranks</h1>
        <p style="color: var(--text-dim); text-transform: uppercase; letter-spacing: 4px; font-size: 10px; font-weight: 800;">Official ELO Rankings</p>
    </header>

    <div class="lb-card">
        <div class="search-container">
            <input type="text" id="search" class="search-input" placeholder="Search for a player..." oninput="drawList()">
        </div>
        <div id="list-target"></div>
    </div>

    <a href="https://discord.gg/xVfQxdGhsQ" class="nav-link" style="margin-top: 40px; color: var(--text-dim);">Official ciibrstudios Server</a>
</div>

<div class="modal" id="modal">
    <div class="modal-content">
        <span class="close" onclick="closeModal()">✕</span>
        <div style="display: flex; align-items: center; gap: 20px;">
            <img id="m-avatar" class="avatar" style="width: 70px; height: 70px;">
            <div>
                <h2 id="m-name" style="font-family: 'Bebas Neue'; font-size: 2.5rem;">-</h2>
                <div id="m-rank" style="font-weight: 800; font-size: 12px; text-transform: uppercase;">-</div>
            </div>
        </div>
        <div style="display: flex; gap: 10px; margin-top: 20px;">
            <div style="flex: 1; background: #161625; padding: 15px; border-radius: 16px; text-align: center;">
                <div style="font-size: 10px; color: var(--text-dim);">STREAK</div>
                <div id="m-streak" style="font-weight: 800; color: var(--gold);">0</div>
            </div>
            <div style="flex: 1; background: #161625; padding: 15px; border-radius: 16px; text-align: center;">
                <div style="font-size: 10px; color: var(--text-dim);">CURRENT ELO</div>
                <div id="m-elo" style="font-weight: 800;">0</div>
            </div>
        </div>
        <div class="graph-area">
            <canvas id="chart"></canvas>
        </div>
    </div>
</div>

<script>
    let players = [];
    let chart = null;

    function getRank(elo) {
        if (elo < 600)  return {n: 'Faint', c: '#00FF7F'};
        if (elo < 900)  return {n: 'Refined', c: '#00BFFF'};
        if (elo < 1200) return {n: 'Lustrous', c: '#BF00FF'};
        if (elo < 1500) return {n: 'Brilliant', c: '#FFFF00'};
        if (elo < 1800) return {n: 'Prismatic', c: '#FF0080'};
        return {n: 'Cosmic', c: '#8A00C4'};
    }

    async function load() {
        try {
            const res = await fetch('https://raw.githubusercontent.com/RoPotat0/Crystallized-Elo-System/main/elo-data.json?t=' + Date.now());
            const data = await res.json();
            players = data.players.sort((a,b) => b.elo - a.elo);
            drawList();
        } catch(e) { console.error("Load failed", e); }
    }

    function drawList() {
        const query = document.getElementById('search').value.toLowerCase();
        const target = document.getElementById('list-target');
        const filtered = players.filter(p => p.name.toLowerCase().includes(query));

        target.innerHTML = filtered.map((p, i) => {
            const r = getRank(p.elo);
            const ava = p.avatar ? `https://cdn.discordapp.com/avatars/${p.discordId}/${p.avatar}.png` : 'https://cdn.discordapp.com/embed/avatars/0.png';
            return `
                <div class="lb-row" onclick="openModal('${p.discordId}')">
                    <div class="pos">${i+1}</div>
                    <img src="${ava}" class="avatar" onerror="this.src='https://cdn.discordapp.com/embed/avatars/0.png'">
                    <div class="name-box">
                        <span class="p-name">${p.name}</span>
                        ${p.streak > 1 ? `<span class="p-streak">🔥 ${p.streak} STREAK</span>` : ''}
                    </div>
                    <div class="rank-tag" style="color: ${r.c}; background: ${r.c}15;">${r.n}</div>
                    <div class="elo">${p.elo}</div>
                </div>
            `;
        }).join('');
    }

    function openModal(id) {
        const p = players.find(x => x.discordId === id);
        const r = getRank(p.elo);
        document.getElementById('m-name').innerText = p.name;
        document.getElementById('m-elo').innerText = p.elo;
        document.getElementById('m-streak').innerText = p.streak || 0;
        document.getElementById('m-rank').innerText = r.n;
        document.getElementById('m-rank').style.color = r.c;
        document.getElementById('m-avatar').src = p.avatar ? `https://cdn.discordapp.com/avatars/${p.discordId}/${p.avatar}.png` : 'https://cdn.discordapp.com/embed/avatars/0.png';
        
        document.getElementById('modal').style.display = 'flex';
        
        const history = p.history || [{elo: 200}];
        const ctx = document.getElementById('chart').getContext('2d');
        if(chart) chart.destroy();
        chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: history.map(h => ''),
                datasets: [{
                    data: history.map(h => h.elo),
                    borderColor: '#c026d3',
                    borderWidth: 3,
                    tension: 0.4,
                    pointRadius: 0,
                    fill: true,
                    backgroundColor: 'rgba(192, 38, 211, 0.1)'
                }]
            },
            options: {
                responsive: true, maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: { x: { display: false }, y: { grid: { color: '#1a1a2e' }, ticks: { color: '#8080a3' } } }
            }
        });
    }

    function closeModal() { document.getElementById('modal').style.display = 'none'; }
    load();
</script>
</body>
</html>
