<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crystallized Elo</title>
<meta property="og:type" content="website">
<meta property="og:title" content="Crystallized Elo">
<meta property="og:description" content="ELO leaderboard and calculator for Crystallized.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #080810;
  --card: #0f0f1a;
  --border: #1e1e2e;
  --text: #e8e8f0;
  --text-dim: #6b6b8a;
  --purple: #c026d3;
  --purple-dim: rgba(192,38,211,0.15);
  --success: #22c55e;
  --danger: #ef4444;
  --warn: #f59e0b;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 0 16px 60px;
  position: relative;
  overflow-x: hidden;
}
/* Background effects */
body::before {
  content: '';
  position: fixed;
  top: -200px; left: 50%;
  transform: translateX(-50%);
  width: 800px; height: 600px;
  background: radial-gradient(ellipse, rgba(192,38,211,0.12) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
}
body::after {
  content: '';
  position: fixed; inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,0.012) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.012) 1px, transparent 1px);
  background-size: 60px 60px;
  pointer-events: none;
  z-index: 0;
}
/* Header */
.site-header {
  position: relative; z-index: 1;
  text-align: center;
  padding: 48px 0 32px;
}
.site-header h1 {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(3rem, 8vw, 5.5rem);
  letter-spacing: 4px;
  background: linear-gradient(135deg, #e040fb, #7c3aed, #60a5fa);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  line-height: 1;
}
.site-header p {
  color: var(--text-dim);
  font-size: 13px;
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-top: 8px;
}
/* Tab nav */
.tab-nav {
  position: relative; z-index: 1;
  display: flex;
  gap: 4px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 5px;
  margin-bottom: 28px;
}
.tab-btn {
  flex: 1;
  padding: 10px 28px;
  border: none; border-radius: 10px;
  font-family: 'DM Sans', sans-serif;
  font-size: 14px; font-weight: 700;
  cursor: pointer;
  transition: all 0.25s ease;
  background: transparent;
  color: var(--text-dim);
  letter-spacing: 0.3px;
}
.tab-btn.active {
  background: linear-gradient(135deg, #c026d3, #7c3aed);
  color: #fff;
  box-shadow: 0 0 20px rgba(192,38,211,0.4);
}
/* Main card */
.card {
  position: relative; z-index: 1;
  width: 100%; max-width: 560px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 20px;
  box-shadow: 0 40px 80px -20px rgba(0,0,0,0.7), inset 0 1px 0 rgba(255,255,255,0.05);
  overflow: hidden;
}
.tab-panel { display: none; }
.tab-panel.active { display: block; }
/* Leaderboard styles (unchanged) */
.lb-header { padding: 28px 28px 0; display: flex; align-items: center; justify-content: space-between; }
.lb-title { font-family: 'Bebas Neue', sans-serif; font-size: 1.6rem; letter-spacing: 2px; color: var(--text); }
.lb-refresh { background: var(--purple-dim); border: 1px solid rgba(192,38,211,0.3); color: var(--purple); border-radius: 8px; padding: 6px 12px; font-size: 12px; font-weight: 700; cursor: pointer; }
.lb-list { padding: 16px 20px 24px; display: flex; flex-direction: column; gap: 8px; }
.lb-row { display: grid; grid-template-columns: 36px 1fr auto auto; align-items: center; gap: 12px; background: rgba(255,255,255,0.025); border: 1px solid var(--border); border-radius: 12px; padding: 12px 16px; }
.lb-badge { font-size: 10px; font-weight: 800; letter-spacing: 0.8px; text-transform: uppercase; padding: 3px 10px; border-radius: 99px; }
/* Rest of your styles (calc, etc.) - kept the same */
</style>
</head>
<body>

<header class="site-header">
  <h1>Crystallized Elo</h1>
  <p>Ranked ELO System</p>
</header>

<nav class="tab-nav">
  <button class="tab-btn active" onclick="switchTab('leaderboard')">🏆 Leaderboard</button>
  <button class="tab-btn" onclick="switchTab('calculator')">🧮 Calculator</button>
</nav>

<div class="card">
  <!-- Leaderboard Tab -->
  <div class="tab-panel active" id="tab-leaderboard">
    <div class="lb-header">
      <span class="lb-title">Rankings</span>
      <button class="lb-refresh" onclick="loadLeaderboard()">↻ Refresh</button>
    </div>
    <div class="lb-list" id="lb-list">
      <div class="lb-loading">Loading rankings...</div>
    </div>
  </div>

  <!-- Calculator Tab (your existing code) -->
  <div class="tab-panel" id="tab-calculator">
    <!-- ... your calculator content ... -->
  </div>
</div>

<script>
// ─── PERCENTILE-BASED getRank (fixed version) ─────────────────────────────
function getRank(elo, allPlayers = []) {
  if (allPlayers.length <= 1) {
    if (elo < 600) return { name: 'Faint',     color: '#00FF7F', bg: 'rgba(0,255,127,0.2)', emoji: '🟢' };
    if (elo < 900) return { name: 'Refined',   color: '#00BFFF', bg: 'rgba(0,191,255,0.2)', emoji: '🔵' };
    if (elo < 1200) return { name: 'Lustrous', color: '#BF00FF', bg: 'rgba(191,0,255,0.2)', emoji: '🟣' };
    if (elo < 1500) return { name: 'Brilliant',color: '#FFFF00', bg: 'rgba(255,255,0,0.2)', emoji: '⭐' };
    if (elo < 1800) return { name: 'Prismatic',color: '#FF0080', bg: 'rgba(255,0,128,0.2)', emoji: '⭕' };
    return { name: 'Cosmic', color: '#8A00C4', bg: 'rgba(138,0,196,0.2)', emoji: '⚫' };
  }

  const sortedElos = [...allPlayers]
    .map(p => Number(p.elo) || 500)
    .sort((a, b) => b - a);

  const totalPlayers = sortedElos.length;
  const rankPosition = sortedElos.findIndex(e => e <= elo); // 0 = highest

  const percentile = (rankPosition / totalPlayers) * 100;

  if (percentile <= 0.03)  return { name: 'Cosmic',    color: '#8A00C4', bg: 'rgba(138,0,196,0.2)', emoji: '⚫' };
  if (percentile <= 1)     return { name: 'Prismatic', color: '#FF0080', bg: 'rgba(255,0,128,0.2)', emoji: '⭕' };
  if (percentile <= 6)     return { name: 'Brilliant', color: '#FFFF00', bg: 'rgba(255,255,0,0.2)', emoji: '⭐' };
  if (percentile <= 27.4)  return { name: 'Lustrous',  color: '#BF00FF', bg: 'rgba(191,0,255,0.2)', emoji: '🟣' };
  if (percentile <= 65.57) return { name: 'Refined',   color: '#00BFFF', bg: 'rgba(0,191,255,0.2)', emoji: '🔵' };
  
  return { name: 'Faint', color: '#00FF7F', bg: 'rgba(0,255,127,0.2)', emoji: '🟢' };
}

// ─── TAB SWITCHER ────────────────────────────────────────────────────────
function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach((b, i) => {
    b.classList.toggle('active', ['leaderboard','calculator'][i] === tab);
  });
  document.querySelectorAll('.tab-panel').forEach(p => {
    p.classList.toggle('active', p.id === `tab-${tab}`);
  });
}

// ─── LEADERBOARD ─────────────────────────────────────────────────────────
async function loadLeaderboard() {
  const list = document.getElementById('lb-list');
  list.innerHTML = '<div class="lb-loading">Loading rankings...</div>';

  try {
    const res = await fetch('https://raw.githubusercontent.com/RoPotat0/Crystallized-Elo-System/main/elo-data.json?t=' + Date.now());
    const json = await res.json();

    const sorted = [...json.players].sort((a, b) => b.elo - a.elo);   // ← only one "sorted" now

    if (sorted.length === 0) {
      list.innerHTML = `<div class="lb-empty">No players yet...</div>`;
      return;
    }

    const medals = ['🥇', '🥈', '🥉'];
    const topClasses = ['top1', 'top2', 'top3'];

    list.innerHTML = sorted.map((player, i) => {
      const rank = getRank(player.elo, json.players);
      const pos = medals[i] ?? `#${i + 1}`;
      const topClass = topClasses[i] ?? '';
      const delay = `animation-delay:${i * 0.05}s`;

      return `
        <div class="lb-row ${topClass}" style="${delay}">
          <div class="lb-pos">${pos}</div>
          <div class="lb-name">${player.name}</div>
          <span class="lb-badge" style="background:${rank.bg};color:${rank.color};border:1px solid ${rank.color}40">
            ${rank.emoji} ${rank.name}
          </span>
          <div class="lb-elo">${player.elo}</div>
        </div>`;
    }).join('');
  } catch (err) {
    console.error(err);
    list.innerHTML = `<div class="lb-error">Failed to load leaderboard.</div>`;
  }
}

// Load leaderboard on start
window.addEventListener('load', loadLeaderboard);

</script>
</body>
</html>
