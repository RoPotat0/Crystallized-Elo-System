<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crystallized Elo</title>
<!-- Open Graph / Discord embed -->
<meta property="og:type" content="website">
<meta property="og:title" content="Crystallized Elo - ELO Calculator">
<meta property="og:description" content="Calculate your ELO rating change after a match. See your new rank, win probability, and upset bonuses.">
<meta property="og:image" content="https://i.imgur.com/placeholder.png">
<!-- Twitter card -->
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="Crystallized Elo - ELO Calculator">
<meta name="twitter:description" content="Calculate your ELO rating change after a match. See your new rank, win probability, and upset bonuses.">
<style>
:root {
  --bg: #0a0a0c;
  --card: #121216;
  --border: #2a2a32;
  --text: #f4f4f5;
  --text-dim: #a3a3a8;
  --success: #22c55e;
  --danger: #ef4444;
  --warn: #f59e0b;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: radial-gradient(circle at 50% 30%, rgba(192,38,211,0.08) 0%, transparent 50%), #0a0a0c;
  color: var(--text);
  font-family: 'Segoe UI', system-ui, sans-serif;
  min-height: 100vh;
  padding: 24px;
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;
}
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
  background-size: 80px 80px;
  pointer-events: none;
}
.container {
  width: 100%; max-width: 540px;
  background: var(--card);
  border-radius: 20px;
  border: 1px solid var(--border);
  box-shadow: 0 30px 70px -15px rgba(0,0,0,0.7), inset 0 1px 0 rgba(255,255,255,0.06);
  position: relative; overflow: hidden;
}
.container::before {
  content: '';
  position: absolute; top:-50%; left:-50%; width:200%; height:200%;
  background: radial-gradient(circle, rgba(192,38,211,0.10) 0%, transparent 70%);
  pointer-events: none; z-index: 0;
}
.view { padding: 2.8rem 2.4rem; position: relative; z-index: 1; }
#view-input { display: block; }
#view-result { display: none; }

/* INPUT */
.notice-top {
  background: rgba(192,38,211,0.12);
  border: 1px solid rgba(192,38,211,0.25);
  color: #e0bbff; font-size: 13.5px;
  padding: 14px 18px; border-radius: 12px;
  margin-bottom: 28px; text-align: center;
  font-weight: 600; letter-spacing: 0.3px;
}
.header { text-align: center; margin-bottom: 2.2rem; }
.header h1 {
  font-size: 1.85rem; font-weight: 900; letter-spacing: -0.5px;
  background: linear-gradient(90deg, #c026d3, #60a5fa, #c026d3);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.section-title {
  font-size: 11px; font-weight: 700; color: var(--text-dim);
  text-transform: uppercase; letter-spacing: 1.2px; margin-bottom: 12px;
}
.grid { display: grid; grid-template-columns: 1fr 1fr; gap: 28px; margin-bottom: 32px; }
.field { display: flex; flex-direction: column; gap: 8px; }
.field label { font-size: 12.5px; color: var(--text-dim); font-weight: 500; }
input[type=number] {
  width: 100%; height: 48px;
  background: #0a0a0c; border: 1.5px solid #27272a;
  border-radius: 12px; padding: 0 16px;
  font-size: 17px; color: #fff; font-weight: 500;
  transition: all 0.25s ease;
  box-shadow: inset 0 2px 4px rgba(0,0,0,0.4);
}
input[type=number]:focus {
  border-color: #c026d3;
  box-shadow: 0 0 0 3px rgba(192,38,211,0.2);
  outline: none;
}
.btn-group { display: flex; gap: 12px; margin-bottom: 28px; }
.toggle-btn {
  flex: 1; height: 46px;
  border: 1.5px solid #27272a; border-radius: 12px;
  font-size: 15px; font-weight: 700;
  cursor: pointer; background: #0a0a0c; color: var(--text-dim);
  transition: all 0.3s cubic-bezier(0.23,1,0.32,1);
}
.toggle-btn:hover { transform: translateY(-1px); }
.toggle-btn.active-win { background: linear-gradient(135deg,#22c55e,#16a34a); color:#fff; border-color:#4ade80; box-shadow:0 0 20px rgba(34,197,94,0.4); }
.toggle-btn.active-draw { background: linear-gradient(135deg,#f59e0b,#d97706); color:#fff; border-color:#fbbf24; box-shadow:0 0 20px rgba(245,158,11,0.4); }
.toggle-btn.active-loss { background: linear-gradient(135deg,#ef4444,#dc2626); color:#fff; border-color:#f87171; box-shadow:0 0 20px rgba(239,68,68,0.4); }
.calc-btn {
  width: 100%; height: 52px;
  border: none; border-radius: 14px;
  font-size: 16px; font-weight: 800;
  cursor: pointer; letter-spacing: 0.5px;
  background: linear-gradient(135deg, #c026d3, #7c3aed);
  color: #fff;
  box-shadow: 0 0 24px rgba(192,38,211,0.45), 0 4px 14px rgba(0,0,0,0.4);
  transition: all 0.25s ease;
}
.calc-btn:hover { transform: translateY(-2px); box-shadow: 0 0 36px rgba(192,38,211,0.6); }
.calc-btn:active { transform: translateY(0); }

/* RESULT */
#view-result { animation: slideIn 0.4s cubic-bezier(0.23,1,0.32,1); }
@keyframes slideIn {
  from { opacity:0; transform:translateY(18px); }
  to { opacity:1; transform:translateY(0); }
}
.result-header { text-align: center; margin-bottom: 1.8rem; }
.result-outcome { font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 6px; }
.result-title { font-size: 1.6rem; font-weight: 900; letter-spacing: -0.5px; }
.players-grid {
  display: grid; grid-template-columns: 1fr 40px 1fr;
  gap: 12px; align-items: center; margin-bottom: 20px;
}
.player-card {
  background: #0a0a0c; border: 1.5px solid #27272a;
  border-radius: 16px; padding: 20px 14px; text-align: center;
  position: relative; overflow: hidden;
}
.player-card::before {
  content: ''; position: absolute; top:0; left:0; right:0; height:1px;
  background: linear-gradient(90deg, transparent, rgba(192,38,211,0.4), transparent);
}
.player-card.winner { border-color: rgba(34,197,94,0.4); }
.player-card.winner::before { background: linear-gradient(90deg, transparent, rgba(34,197,94,0.5), transparent); }
.player-card.loser { border-color: rgba(239,68,68,0.3); }
.player-card.loser::before { background: linear-gradient(90deg, transparent, rgba(239,68,68,0.4), transparent); }
.player-label { font-size:10px; font-weight:700; color:var(--text-dim); text-transform:uppercase; letter-spacing:1px; margin-bottom:10px; }
.player-elo-new { font-size:36px; font-weight:900; letter-spacing:-1px; line-height:1; margin-bottom:4px; }
.player-elo-old { font-size:12px; color:var(--text-dim); margin-bottom:8px; }
.elo-delta { font-size:14px; font-weight:700; margin-bottom:10px; }
.rank-badge {
  display:inline-block; padding:4px 12px; border-radius:9999px;
  font-size:10px; font-weight:800; letter-spacing:0.6px; text-transform:uppercase;
}
.vs-circle {
  width:40px; height:40px; border-radius:50%;
  background:#1a1a1e; border:1.5px solid #27272a;
  display:flex; align-items:center; justify-content:center;
  font-size:11px; font-weight:800; color:var(--text-dim); margin:0 auto;
}
.stats-row {
  background:#0a0a0c; border:1.5px solid #27272a; border-radius:14px;
  padding:16px 20px; margin-bottom:20px;
  display:flex; justify-content:space-around;
}
.stat-item { text-align:center; }
.stat-val { font-size:20px; font-weight:800; margin-bottom:3px; }
.stat-lbl { font-size:10px; color:var(--text-dim); text-transform:uppercase; letter-spacing:0.8px; font-weight:600; }
.action-btns { display:flex; gap:10px; }
.btn-back {
  height:48px; padding:0 20px;
  border:1.5px solid #27272a; border-radius:12px;
  font-size:14px; font-weight:700; cursor:pointer;
  background:#0a0a0c; color:var(--text-dim);
  transition:all 0.25s ease;
}
.btn-back:hover { border-color:#52525b; color:var(--text); }
.btn-rematch {
  flex:1; height:48px;
  border:1.5px solid #27272a; border-radius:12px;
  font-size:14px; font-weight:700; cursor:pointer;
  background:#0a0a0c; color:var(--text-dim);
  transition:all 0.25s ease;
  display:flex; align-items:center; justify-content:center; gap:7px;
}
.btn-rematch:hover { border-color:#52525b; color:var(--text); transform:translateY(-1px); }

/* rank-up flash */
.rankup-flash {
  position:absolute; inset:0; border-radius:16px;
  pointer-events:none;
  animation:rankFlash 0.9s ease forwards;
  z-index:10;
}
@keyframes rankFlash {
  0% { box-shadow:inset 0 0 0 2px rgba(255,215,0,0.9),0 0 40px rgba(255,215,0,0.6); opacity:1; }
  100% { box-shadow:inset 0 0 0 2px transparent,0 0 0 transparent; opacity:0; }
}
</style>
</head>
<body>
<div class="container">
  <!-- INPUT VIEW -->
  <div class="view" id="view-input">
    <div class="notice-top">New players start at 500 ELO</div>
    <div class="header"><h1>Crystallized Elo</h1></div>
    <div class="grid">
      <div class="field">
        <p class="section-title">You - Player A</p>
        <label>ELO Rating</label>
        <input type="number" id="ratingA" value="500" min="0">
      </div>
      <div class="field">
        <p class="section-title">Opponent - Player B</p>
        <label>ELO Rating</label>
        <input type="number" id="ratingB" value="500" min="0">
      </div>
    </div>
    <div class="btn-group">
      <button class="toggle-btn active-win" id="btn-win" onclick="setResult('win')">WIN</button>
      <button class="toggle-btn" id="btn-draw" onclick="setResult('draw')">DRAW</button>
      <button class="toggle-btn" id="btn-loss" onclick="setResult('loss')">LOSS</button>
    </div>
    <button class="calc-btn" onclick="calculate()">CALCULATE →</button>
  </div>

  <!-- RESULT VIEW -->
  <div class="view" id="view-result"></div>
</div>

<script>
let result = 'win';
let lastCalc = null;

function setResult(r) {
  result = r;
  document.getElementById('btn-win').className = 'toggle-btn' + (r==='win' ? ' active-win' : '');
  document.getElementById('btn-draw').className = 'toggle-btn' + (r==='draw' ? ' active-draw' : '');
  document.getElementById('btn-loss').className = 'toggle-btn' + (r==='loss' ? ' active-loss' : '');
}

function getRank(elo) {
  if (elo < 600) return { name:'BRONZE', color:'#cd7f32', bg:'rgba(205,127,50,0.2)' };
  if (elo < 900) return { name:'SILVER', color:'#c0c0c0', bg:'rgba(192,192,192,0.2)' };
  if (elo < 1200) return { name:'GOLD', color:'#ffd700', bg:'rgba(255,215,0,0.2)' };
  if (elo < 1500) return { name:'PLATINUM', color:'#e5e4e2', bg:'rgba(229,228,226,0.2)' };
  if (elo < 1800) return { name:'DIAMOND', color:'#67e8f9', bg:'rgba(103,232,249,0.2)' };
  return { name:'CHAMPION', color:'#c026d3', bg:'rgba(192,38,211,0.25)' };
}

function rankIndex(elo) {
  if (elo < 600) return 0; if (elo < 900) return 1;
  if (elo < 1200) return 2; if (elo < 1500) return 3;
  if (elo < 1800) return 4; return 5;
}

// Auto-load from URL
window.addEventListener('DOMContentLoaded', () => {
  try {
    const p = new URLSearchParams(window.location.search);
    if (p.has('rA') && p.has('rB') && p.has('res')) {
      document.getElementById('ratingA').value = p.get('rA');
      document.getElementById('ratingB').value = p.get('rB');
      setResult(p.get('res'));
      calculate(true);
    }
  } catch(e) {}
});

function calculate(fromURL = false) {
  const rA = parseFloat(document.getElementById('ratingA').value) || 0;
  const rB = parseFloat(document.getElementById('ratingB').value) || 0;
  const K = 30;

  const expectedA = 1 / (1 + Math.pow(10, (rB - rA) / 400));
  const expectedB = 1 - expectedA;

  let scoreA = result === 'win' ? 1 : (result === 'draw' ? 0.5 : 0);
  let scoreB = 1 - scoreA;

  let deltaA = Math.round(K * (scoreA - expectedA));
  let deltaB = Math.round(K * (scoreB - expectedB));

  let upsetBonus = 0;
  if (result === 'win' && rB > rA) { 
    upsetBonus = 10; 
    deltaA += upsetBonus; 
  }

  const newA = Math.max(0, Math.round(rA + deltaA));
  const newB = Math.max(0, Math.round(rB + deltaB));

  const rankedUp = rankIndex(newA) > rankIndex(rA);

  lastCalc = { rA, rB, result, deltaA, deltaB, newA, newB, expectedA, upsetBonus };

  if (!fromURL) {
    try {
      const url = new URL(window.location.href);
      url.searchParams.set('rA', rA);
      url.searchParams.set('rB', rB);
      url.searchParams.set('res', result);
      history.pushState({}, '', url.toString());
    } catch(e) {}
  }

  renderResult(lastCalc, rankedUp);
  switchView('result');
}

function renderResult({ rA, rB, result, deltaA, deltaB, newA, newB, expectedA, upsetBonus }, rankedUp) {
  const rankA = getRank(newA);
  const rankB = getRank(newB);
  const outcomeText = result==='win' ? 'Victory' : result==='draw' ? 'Draw' : 'Defeat';
  const outcomeColor = result==='win' ? 'var(--success)' : result==='draw' ? 'var(--warn)' : 'var(--danger)';

  const cardClassA = result==='win' ? 'player-card winner' : result==='loss' ? 'player-card loser' : 'player-card';
  const cardClassB = result==='loss' ? 'player-card winner' : result==='win' ? 'player-card loser' : 'player-card';

  const upsetNote = upsetBonus > 0 ? `<div style="margin-top:8px;font-size:11px;color:#fbbf24;font-weight:700;">+${upsetBonus} UPSET BONUS</div>` : '';
  const rankupDiv = rankedUp ? `<div class="rankup-flash"></div>` : '';

  document.getElementById('view-result').innerHTML = `
    <div class="result-header">
      <div class="result-outcome" style="color:${outcomeColor}">${outcomeText}</div>
      <div class="result-title">ELO Updated</div>
    </div>
    <div class="players-grid">
      <div class="${cardClassA}">
        ${rankupDiv}
        <div class="player-label">You</div>
        <div class="player-elo-new">${newA}</div>
        <div class="player-elo-old">was ${rA}</div>
        <div class="elo-delta" style="color:${deltaA>=0?'var(--success)':'var(--danger)'}">
          ${deltaA>=0?'↑':'↓'} ${Math.abs(deltaA)}
        </div>
        <span class="rank-badge" style="background:${rankA.bg};color:${rankA.color};border:1px solid ${rankA.color}40;">${rankA.name}</span>
        ${upsetNote}
      </div>
      <div class="vs-circle">VS</div>
      <div class="${cardClassB}">
        <div class="player-label">Opponent</div>
        <div class="player-elo-new">${newB}</div>
        <div class="player-elo-old">was ${rB}</div>
        <div class="elo-delta" style="color:${deltaB>=0?'var(--success)':'var(--danger)'}">
          ${deltaB>=0?'↑':'↓'} ${Math.abs(deltaB)}
        </div>
        <span class="rank-badge" style="background:${rankB.bg};color:${rankB.color};border:1px solid ${rankB.color}40;">${rankB.name}</span>
      </div>
    </div>
    <div class="stats-row">
      <div class="stat-item">
        <div class="stat-val">${Math.round(expectedA * 100)}%</div>
        <div class="stat-lbl">Win Prob</div>
      </div>
      <div class="stat-item">
        <div class="stat-val" style="color:${deltaA>=0?'var(--success)':'var(--danger)'}">${deltaA>=0?'+':''}${deltaA}</div>
        <div class="stat-lbl">Your ELO Δ</div>
      </div>
      <div class="stat-item">
        <div class="stat-val">${Math.abs(rB - rA)}</div>
        <div class="stat-lbl">Rating Gap</div>
      </div>
    </div>
    <div class="action-btns">
      <button class="btn-back" onclick="goBack()">← Back</button>
      <button class="btn-rematch" onclick="rematch()">Rematch</button>
    </div>
  `;
}

function switchView(to) {
  document.getElementById('view-input').style.display = to==='input' ? 'block' : 'none';
  document.getElementById('view-result').style.display = to==='result' ? 'block' : 'none';
}

function goBack() {
  try { history.pushState({}, '', window.location.pathname); } catch(e) {}
  switchView('input');
}

function rematch() {
  if (!lastCalc) return;
  document.getElementById('ratingA').value = lastCalc.newA;
  document.getElementById('ratingB').value = lastCalc.newB;
  setResult('win');
  try { history.pushState({}, '', window.location.pathname); } catch(e) {}
  switchView('input');
}
</script>
</body>
</html>
